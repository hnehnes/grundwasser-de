name: HACS

on:
  push:
  pull_request:
  schedule:
    - cron: "0 5 * * 1"

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run HACS Action
        uses: hacs/action@main
        with:
          category: integration
          # 'brands' wird ignoriert, bis das Icon unter home-assistant/brands
          # für die Domain 'niwis' eingereicht ist (nur für Default-Store nötig).
          ignore: brands
