# Beispiel-Dashboard für die NIWIS-Integration
# ---------------------------------------------
# Einbinden:
#   Einstellungen → Dashboards → Dashboard hinzufügen → (leer) → oben rechts ⋮
#   → "Raw-Konfigurationseditor" → diesen Inhalt einfügen.
#
# WICHTIG – entity_ids anpassen:
# Die IDs ergeben sich aus dem (sprechenden) Gerätenamen deiner Messstelle:
#   sensor.<geraet>_<messgroesse>                     (aktueller Wert)
#   sensor.<geraet>_niedrigwasserklasse_<messgroesse> (Niedrigwasserklasse, Text)
#   sensor.<geraet>_trend_<messgroesse>               (Trend)
# Beispiel Gerät "Woltersdorf OP (Rüdersdorfer)", Messgröße Wasserstand:
#   sensor.woltersdorf_op_rudersdorfer_wasserstand
#   sensor.woltersdorf_op_rudersdorfer_niedrigwasserklasse_wasserstand
# Die exakten IDs findest du unter Einstellungen → Geräte & Dienste → NIWIS.
#
# Ersetze die Beispiel-Stationen unten durch deine eigenen und dupliziere die
# beiden Kacheln (Wert + Klasse) je Messstelle.

title: NIWIS Niedrigwasser
views:
  - title: Niedrigwasser
    path: niwis
    type: sections
    icon: mdi:waves-arrow-down
    max_columns: 2
    header:
      layout: center
      card:
        type: markdown
        content: >
          ## 🌊 NIWIS – Niedrigwasser

          Aktuelle Messwerte und Niedrigwasserklasse (Bezug 1991–2020).
          Quelle: Bundesanstalt für Gewässerkunde (BfG) · niwis-online.de
    sections:
      # ---------------- Grundwasser ----------------
      - type: grid
        cards:
          - type: heading
            heading: Grundwasser
            icon: mdi:water-well
          - type: tile
            entity: sensor.niederschonhausen_pankow_grundwasserstand
            name: Niederschönhausen (Pankow)
            color: brown
            vertical: false
            features_position: inline
            features:
              - type: trend-graph
                hours_to_show: 168
            grid_options: { columns: 8 }
          - type: tile
            entity: sensor.niederschonhausen_pankow_niedrigwasserklasse_grundwasserstand
            name: Klasse
            icon: mdi:alert-outline
            grid_options: { columns: 4 }
          - type: history-graph
            title: Grundwasserstand – Verlauf 7 Tage
            hours_to_show: 168
            grid_options: { columns: full, rows: 4 }
            entities:
              - entity: sensor.niederschonhausen_pankow_grundwasserstand
                name: Niederschönhausen (Pankow)

      # ------------- Oberflächenwasser -------------
      - type: grid
        cards:
          - type: heading
            heading: Wasserstand
            icon: mdi:waves
          - type: tile
            entity: sensor.woltersdorf_op_rudersdorfer_wasserstand
            name: Woltersdorf OP
            color: blue
            vertical: false
            features_position: inline
            features:
              - type: trend-graph
                hours_to_show: 168
            grid_options: { columns: 8 }
          - type: tile
            entity: sensor.woltersdorf_op_rudersdorfer_niedrigwasserklasse_wasserstand
            name: Klasse
            icon: mdi:alert-outline
            grid_options: { columns: 4 }
          - type: history-graph
            title: Wasserstand – Verlauf 7 Tage
            hours_to_show: 168
            grid_options: { columns: full, rows: 4 }
            entities:
              - entity: sensor.woltersdorf_op_rudersdorfer_wasserstand
                name: Woltersdorf OP (Rüdersdorfer)

      # ---------------- Abfluss --------------------
      - type: grid
        cards:
          - type: heading
            heading: Abfluss
            icon: mdi:water-outline
          - type: tile
            entity: sensor.hohenbinde_spree_muggelspree_abfluss
            name: Hohenbinde
            color: cyan
            vertical: false
            features_position: inline
            features:
              - type: trend-graph
                hours_to_show: 168
            grid_options: { columns: 8 }
          - type: tile
            entity: sensor.hohenbinde_spree_muggelspree_niedrigwasserklasse_abfluss
            name: Klasse
            icon: mdi:alert-outline
            grid_options: { columns: 4 }
          # Langzeit-Statistik (nutzt HA-Langzeitstatistik der Messwert-Sensoren)
          - type: statistics-graph
            title: Abfluss – 30-Tage-Statistik
            days_to_show: 30
            period: day
            stat_types: [mean, min, max]
            grid_options: { columns: full, rows: 4 }
            entities:
              - sensor.hohenbinde_spree_muggelspree_abfluss
